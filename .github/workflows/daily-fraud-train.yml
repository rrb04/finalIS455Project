# Retrains the fraud model from Supabase and updates ml_scoring_config.
# Add repo secret DATABASE_URL (Settings → Secrets → Actions) with the
# Supabase Postgres connection string (same as in Project Settings → Database).

name: Daily fraud model train

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements-train.txt

      - name: Train and upload config
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/train_from_supabase.py
